name: de-time docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "docs/**"
      - "benchmarks/**"
      - "evals/**"
      - "examples/**"
      - "mkdocs.yml"
      - "README.md"
      - "MANIFEST.in"
      - "pyproject.toml"
      - "scripts/check_doc_consistency.py"
      - "scripts/generate_schema_assets.py"
      - "scripts/generate_method_cards.py"
      - "scripts/generate_notebook_gallery.py"
      - "scripts/generate_tutorial_assets.py"
      - "scripts/generate_reviewer_bundle.py"
      - "src/detime/schema_assets/**"
      - "src/detime/registry.py"
      - "src/detime/schemas.py"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout design site source
      run: |
        git clone --depth 1 https://github.com/Jackson-jjc/De-time.design.git design-site

      - name: Normalize design site links
      run: |
        python - << 'PY'
        from pathlib import Path

        base_js = Path('design-site/site/js/base.js')
        if base_js.exists():
          text = base_js.read_text(encoding='utf-8')
          snippet = """

  // Normalize canonical + repo links for GitHub Pages deployment
  try {
    var canonical = window.location.origin + window.location.pathname;
    document.querySelectorAll('link[rel="canonical"]').forEach(function(node) {
      node.setAttribute('href', canonical);
    });

    var repoHref = 'https://github.com/systems-mechanobiology/De-Time';
    var repoText = 'systems-mechanobiology/De-Time';
    document.querySelectorAll('a[href="https://github.com/Jackson-jjc/De-time.design"]').forEach(function(node) {
      node.setAttribute('href', repoHref);
      node.textContent = repoText;
    });

    document.querySelectorAll('[href^="/De-time.design/"]').forEach(function(node) {
      node.setAttribute('href', node.getAttribute('href').replace('/De-time.design/', '/De-Time/'));
    });
    document.querySelectorAll('[src^="/De-time.design/"]').forEach(function(node) {
      node.setAttribute('src', node.getAttribute('src').replace('/De-time.design/', '/De-Time/'));
    });
  } catch (err) {
    // no-op
  }
  """
          if 'Normalize canonical + repo links for GitHub Pages deployment' not in text:
            base_js.write_text(text + snippet, encoding='utf-8')

        error_page = Path('design-site/site/404.html')
        if error_page.exists():
          text = error_page.read_text(encoding='utf-8')
          text = text.replace('/De-time.design/', '/De-Time/')
          error_page.write_text(text, encoding='utf-8')
        PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,docs,notebook]

      - name: Use prebuilt site if present (skip MkDocs build)
        run: |
          # If a prebuilt design site exists, deploy it as-is.
          if [ -d design-site/site ]; then
            echo "Found prebuilt design-site/site — skipping MkDocs build."
            ls -la design-site/site | head -n 20
          elif [ -d website/De-time.design/site ]; then
            echo "Found prebuilt website/De-time.design/site — skipping MkDocs build."
            ls -la website/De-time.design/site | head -n 20
          elif [ -d site ]; then
            echo "Found prebuilt site/ directory — skipping MkDocs build."
            ls -la site | head -n 20
          else
            echo "No prebuilt site/ directory found — running MkDocs build."
            python scripts/generate_schema_assets.py --check || true
            python scripts/generate_schema_assets.py || true
            python scripts/generate_method_cards.py || true
            python scripts/generate_notebook_gallery.py || true
            python scripts/generate_tutorial_assets.py || true
            python benchmarks/software_comparison/generate_comparison_evidence.py || true
            python examples/workflow_comparisons/compare_specialist_glue_vs_detime.py || true
            python benchmarks/token_benchmarks/generate_token_benchmarks.py || true
            python evals/agent/run_agent_evals.py || true
            python scripts/generate_reviewer_bundle.py || true
            python scripts/check_doc_consistency.py || true
            mkdocs build --strict
          fi

      - name: Select Pages output directory
        id: pages_output
        run: |
          if [ -d design-site/site ]; then
            echo "site_dir=design-site/site" >> "$GITHUB_OUTPUT"
          elif [ -d website/De-time.design/site ]; then
            echo "site_dir=website/De-time.design/site" >> "$GITHUB_OUTPUT"
          else
            echo "site_dir=site" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.pages_output.outputs.site_dir }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
