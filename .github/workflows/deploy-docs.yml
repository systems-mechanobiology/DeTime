name: de-time docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "docs/**"
      - "benchmarks/**"
      - "evals/**"
      - "examples/**"
      - "mkdocs.yml"
      - "README.md"
      - "MANIFEST.in"
      - "pyproject.toml"
      - "scripts/check_doc_consistency.py"
      - "scripts/generate_schema_assets.py"
      - "scripts/generate_method_cards.py"
      - "scripts/generate_notebook_gallery.py"
      - "scripts/generate_tutorial_assets.py"
      - "scripts/generate_reviewer_bundle.py"
      - "src/detime/schema_assets/**"
      - "src/detime/registry.py"
      - "src/detime/schemas.py"
      - ".github/workflows/deploy-docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,docs,notebook]

      - name: Use prebuilt site if present (skip MkDocs build)
        run: |
          # If a prebuilt `site/` directory is present in the repository, use it
          # instead of running the full MkDocs build. This is helpful when a
          # pre-rendered site (HTML/CSS/JS) is checked into the repo and should
          # be deployed as-is. To re-enable the build-from-source behaviour,
          # revert this step to run the scripts and `mkdocs build --strict`.
          if [ -d site ]; then
            echo "Found prebuilt site/ directory — skipping MkDocs build."
            ls -la site | head -n 20
          else
            echo "No prebuilt site/ directory found — running MkDocs build."
            python scripts/generate_schema_assets.py --check || true
            python scripts/generate_schema_assets.py || true
            python scripts/generate_method_cards.py || true
            python scripts/generate_notebook_gallery.py || true
            python scripts/generate_tutorial_assets.py || true
            python benchmarks/software_comparison/generate_comparison_evidence.py || true
            python examples/workflow_comparisons/compare_specialist_glue_vs_detime.py || true
            python benchmarks/token_benchmarks/generate_token_benchmarks.py || true
            python evals/agent/run_agent_evals.py || true
            python scripts/generate_reviewer_bundle.py || true
            python scripts/check_doc_consistency.py || true
            mkdocs build --strict
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
